spring.application.name=syscraft-backend

# Server Port
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/syscraft_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (Should be environment variable in production)
jwt.secret=94a08da1fecbb6e8b46990538c7b50b2a514d2e1b12b5cd37e0c8b9d31d4e7f8a

# Disable Spring Security default login page for REST API
spring.security.user.name=admin
spring.security.user.password=admin
